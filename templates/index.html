<!DOCTYPE html>
<html>
<head>
    <title>RentEase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount() {
    document.getElementById("cart-count").innerText = cart.length;
}

function addToCart(productName) {
    cart.push(productName);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    alert(productName + " added to cart!");
}

updateCartCount();
</script>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">RentEase</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#">Contact</a>
        <a href="#">Login</a>
        <a href="#" id="cart-link">Cart (<span id="cart-count">0</span>)</a>
    </div>
</div>

<!-- HERO SECTION -->
<div class="hero">
    <h1>Affordable Furniture Rentals for Urban Living</h1>
    <p>Flexible plans. Zero hassle. Easy relocation.</p>
    <a href="#products" class="hero-btn">Browse Now</a>
</div>

<!-- PRODUCTS SECTION -->
<div class="container" id="products">

    {% for product in products %}
    <div class="card">
        <img src="{{ url_for('static', filename='images/' + product.image) }}">
        <h3>{{ product.name }}</h3>
        <p>Monthly Rent: ₹{{ product.rent }}</p>
        <p>Deposit: ₹{{ product.deposit }}</p>

        <button onclick="addToCart('{{ product.name }}')">
            Add to Cart
        </button>
    </div>
    {% endfor %}

</div>

<!-- SCRIPT -->
<script>
function addToCart(productName) {
    alert(productName + " added to cart!");
}
</script>

</body>
</html>
